<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FFB6C1" id="themeColor">
    <title>Нежный дневник | Уютный планировщик</title>
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- System Styles (variables for JS modules) -->
    <link rel="stylesheet" href="./src/styles/variables.css">
    
    <style>
        
        /* === БАЗОВЫЕ СТИЛИ === */
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary: #FF9AAE;
            --primary-light: #FFB6C1;
            --primary-dark: #E8839A;
            --secondary: #80CBC4;
            --secondary-dark: #5BA89F;
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --surface-secondary: #F8F8F8;
            --text: #2C2C2C;
            --text-light: #8E8E8E;
            --border: #F0F0F0;
            --shadow: 0 8px 32px rgba(0,0,0,0.04);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.08);
            --radius-lg: 32px;
            --radius-md: 24px;
            --radius-sm: 16px;
        }
        [data-theme="dark"]{
            --bg: #1a1a2e;
            --surface: #2D2D44;
            --surface-secondary: #3D3D5C;
            --text: #E8E8E8;
            --text-light: #A0A0B8;
            --border: #3D3D5C;
            --shadow: 0 8px 32px rgba(0,0,0,0.2);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.3);
        }
        body{
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            transition: background 0.3s ease, color 0.3s ease;
            line-height: 1.5;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,182,193,0.08) 0%, rgba(128,203,196,0.08) 25%, rgba(255,218,193,0.08) 50%, rgba(128,203,196,0.08) 75%, rgba(255,182,193,0.08) 100%);
            background-size: 200% 200%;
            animation: gradientShift 12s ease infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes gradientShift {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* === КОНТЕЙНЕР === */
        .container{max-width:600px;margin:0 auto;padding:16px;padding-bottom:80px}
        
        /* === HEADER === */
        .header{
            display:flex;justify-content:space-between;align-items:center;
            padding:12px 0;margin-bottom:20px;
        }
        .logo{
            font-size:22px;font-weight:700;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            -webkit-background-clip:text;background-clip:text;color:transparent;
            animation:shimmer 4s ease infinite;
        }
        @keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        
        .user-actions{display:flex;align-items:center;gap:12px}
        .avatar-btn{
            width:44px;height:44px;border-radius:50%;
            background:linear-gradient(135deg,var(--primary-light),var(--secondary));
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;border:2px solid var(--surface);
            box-shadow:var(--shadow);transition:all 0.3s ease;font-size:20px;
        }
        .avatar-btn:hover{transform:scale(1.05);box-shadow:var(--shadow-lg)}
        .theme-toggle{position:relative;width:52px;height:28px}
        .theme-toggle input{opacity:0;width:0;height:0}
        .slider{
            position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
            background:var(--surface-secondary);border-radius:28px;
            transition:0.3s;border:1px solid var(--border);
        }
        .slider:before{
            position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;
            background:var(--primary);border-radius:50%;transition:0.3s;
        }
        input:checked + .slider{background:var(--primary-dark)}
        input:checked + .slider:before{transform:translateX(24px);background:white}

        /* === NAVIGATION === */
        .nav{
            display:flex;gap:8px;margin-bottom:24px;
            background:var(--surface);padding:6px;border-radius:60px;
            box-shadow:var(--shadow);position:relative;overflow:hidden;
        }
        .nav-btn{
            flex:1;background:transparent;border:none;padding:12px 8px;
            border-radius:50px;font-size:13px;font-weight:500;
            color:var(--text-light);cursor:pointer;transition:all 0.3s ease;z-index:1;
        }
        .nav-btn.active{
            background:linear-gradient(135deg,var(--primary-light),var(--primary));
            color:white;box-shadow:0 4px 15px rgba(255,154,174,0.3);
        }

        /* === CARDS & ITEMS === */
        .card{
            background:var(--surface);border-radius:var(--radius-lg);
            padding:20px;box-shadow:var(--shadow);transition:all 0.3s ease;
            position:relative;overflow:hidden;margin-bottom:16px;
        }
        .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
        .card::after{
            content:'';position:absolute;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,var(--primary),var(--secondary),var(--primary));
            transform:translateX(-100%);transition:transform 0.5s ease;
        }
        .card:hover::after{transform:translateX(0)}
        
        .section-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:16px}
        
        .item{
            display:flex;align-items:center;gap:12px;padding:14px 16px;
            background:var(--surface-secondary);border-radius:var(--radius-md);
            margin-bottom:8px;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .item:hover{
            transform:translateX(6px);
            background:linear-gradient(90deg,var(--surface-secondary),rgba(255,182,193,0.15));
        }
        .item-checkbox{
            width:22px;height:22px;border-radius:50%;
            border:2px solid var(--primary-light);background:var(--surface);
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;transition:all 0.2s ease;flex-shrink:0;
        }
        .item-checkbox.checked{
            background:var(--primary);border-color:var(--primary);color:white;
            transform:scale(1.1);
        }
        .item-content{flex:1;min-width:0}
        .item-title{font-weight:500;margin-bottom:2px;word-wrap:break-word}
        .item-note{font-size:13px;color:var(--text-light);word-wrap:break-word}
        .item-meta{font-size:12px;color:var(--text-light);margin-top:4px}
        .item-actions{display:flex;gap:4px}
        .btn-icon{
            background:transparent;border:none;cursor:pointer;font-size:16px;
            padding:6px;border-radius:50%;transition:all 0.2s ease;
            color:var(--text-light);
        }
        .btn-icon:hover{background:rgba(229,115,115,0.15);color:#E57373;transform:scale(1.1)}

        /* === BUTTONS === */
        .btn-primary{
            width:100%;padding:14px;
            background:linear-gradient(135deg,var(--primary-light),var(--primary),var(--secondary),var(--primary-light));
            background-size:300% 300%;border:none;border-radius:60px;
            color:white;font-weight:600;font-size:15px;cursor:pointer;
            transition:all 0.3s ease;animation:btnShimmer 4s ease infinite;
        }
        @keyframes btnShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,154,174,0.4);animation:none}
        
        .btn-secondary{
            width:100%;padding:14px;background:transparent;
            border:2px solid var(--primary-light);border-radius:60px;
            color:var(--primary);font-weight:600;cursor:pointer;
            transition:all 0.3s ease;
        }
        .btn-secondary:hover{
            background:linear-gradient(135deg,var(--primary-light),var(--primary));
            color:white;transform:translateY(-2px);
        }
        .btn-danger{border-color:#E57373;color:#E57373}
        .btn-danger:hover{background:#E57373;color:white}
        .btn-floating{
            position:fixed;bottom:24px;right:24px;width:56px;height:56px;
            border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));
            color:white;border:none;font-size:24px;cursor:pointer;
            box-shadow:0 8px 25px rgba(255,154,174,0.5);
            transition:all 0.3s ease;z-index:100;
        }
        .btn-floating:hover{transform:scale(1.1) rotate(5deg);box-shadow:0 12px 35px rgba(255,154,174,0.7)}

        /* === AUTH SECTION === */
        #auth-root{
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            padding:20px;background:transparent;
        }
        .auth-card{
            max-width:400px;width:100%;padding:28px 24px;
            border-radius:var(--radius-lg);background:var(--surface);
            box-shadow:var(--shadow-lg);text-align:center;
        }
        .auth-title{font-size:24px;font-weight:700;margin-bottom:8px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            -webkit-background-clip:text;background-clip:text;color:transparent;}
        .auth-subtitle{color:var(--text-light);margin-bottom:24px;font-size:14px}
        .auth-tabs{display:flex;gap:8px;margin-bottom:20px}
        .tab-btn{
            flex:1;padding:12px;border:2px solid var(--border);
            background:var(--surface);border-radius:60px;
            cursor:pointer;font-weight:500;transition:all 0.3s ease;
        }
        .tab-btn.active{
            background:linear-gradient(135deg,var(--primary-light),var(--primary));
            color:white;border-color:transparent;
        }
        .auth-input{
            width:100%;padding:14px 18px;border:2px solid var(--border);
            border-radius:60px;font-size:15px;margin-bottom:12px;
            background:var(--surface);color:var(--text);
            transition:all 0.3s ease;
        }
        .auth-input:focus{
            outline:none;border-color:var(--primary-light);
            box-shadow:0 0 0 4px rgba(255,182,193,0.2);transform:translateY(-1px);
        }
        .auth-message{
            margin-top:16px;padding:12px;border-radius:var(--radius-sm);
            font-weight:500;font-size:14px;
        }
        .auth-message.success{background:rgba(128,203,196,0.15);color:#2E7D32}
        .auth-message.error{background:rgba(229,115,115,0.15);color:#C62828}

        /* === MODALS === */
        .modal,.confirm-modal{
            display:none;position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);
            z-index:1000;justify-content:center;align-items:center;
        }
        .modal.active,.confirm-modal.active{display:flex}
        .modal-content,.confirm-content{
            background:var(--surface);border-radius:40px;padding:24px;
            width:90%;max-width:380px;animation:modalSlide 0.4s cubic-bezier(0.4,0,0.2,1);
            position:relative;overflow:hidden;
        }
        .confirm-content{text-align:center}
        .modal-content::before,.confirm-content::before{
            content:'';position:absolute;top:0;left:0;right:0;height:3px;
            background:linear-gradient(90deg,var(--primary),var(--secondary),var(--primary));
        }
        @keyframes modalSlide{from{opacity:0;transform:translateY(25px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        .modal-title{
            font-size:20px;font-weight:600;text-align:center;margin-bottom:20px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            -webkit-background-clip:text;background-clip:text;color:transparent;
        }
        .modal-input,.modal-textarea{
            width:100%;padding:14px 18px;border:2px solid var(--border);
            border-radius:60px;font-size:15px;margin-bottom:12px;
            background:var(--surface);color:var(--text);transition:all 0.3s ease;
        }
        .modal-textarea{border-radius:24px;resize:vertical}
        .modal-input:focus,.modal-textarea:focus{
            outline:none;border-color:var(--primary-light);
            box-shadow:0 0 0 4px rgba(255,182,193,0.2);
        }
        .modal-buttons{display:flex;gap:10px;margin-top:16px}
        .modal-buttons .btn-primary,.modal-buttons .btn-secondary{padding:12px;font-size:14px}
        
        .confirm-icon{font-size:44px;margin-bottom:12px}
        .confirm-text{font-size:16px;margin-bottom:6px;font-weight:500}
        .confirm-subtext{font-size:13px;color:var(--text-light);margin-bottom:20px}
        .confirm-buttons{display:flex;gap:10px}
        .confirm-buttons button{flex:1;padding:12px;border-radius:60px;font-weight:600;cursor:pointer;transition:all 0.3s ease}

        /* === TOAST === */
        .toast{
            position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
            background:var(--surface);border-radius:60px;padding:12px 24px;
            display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);
            z-index:1100;transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
            font-weight:500;border-left:3px solid var(--primary);
        }
        .toast.show{transform:translateX(-50%) translateY(0)}

        /* === EMPTY STATE === */
        .empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
        .empty-icon{font-size:48px;margin-bottom:12px;animation:float 3s ease infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .empty-text{font-size:14px}

        /* === PROFILE MODAL === */
        .avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
        .avatar-option{
            font-size:28px;padding:10px;text-align:center;border-radius:50%;
            background:var(--surface-secondary);cursor:pointer;transition:all 0.3s ease;
        }
        .avatar-option:hover,.avatar-option.selected{
            background:linear-gradient(135deg,var(--primary-light),var(--primary));
            transform:scale(1.1);box-shadow:0 0 15px rgba(255,154,174,0.4);
        }
        .theme-options{display:flex;gap:10px;margin:16px 0}
        .theme-btn{
            flex:1;padding:10px;border-radius:60px;border:2px solid var(--border);
            background:var(--surface);cursor:pointer;transition:all 0.3s ease;font-size:13px;
        }
        .theme-btn.active{
            background:linear-gradient(135deg,var(--primary-light),var(--primary));
            color:white;border-color:transparent;
        }

        /* === MODULE SPECIFIC OVERRIDES === */
        /* Для совместимости с tasks.css, notes.css, tracker.css */
        #main-container .card { margin-bottom: 16px; }
        #main-container .btn-primary { width: auto; padding: 10px 20px; font-size: 14px; }
        #main-container input, #main-container textarea {
            background: var(--surface); color: var(--text);
            border: 2px solid var(--border); border-radius: 16px;
            padding: 10px 14px; font-size: 14px;
        }
        #main-container input:focus, #main-container textarea:focus {
            outline: none; border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(255,182,193,0.2);
        }
        /* === TRACKER SPECIFIC === */
.calendar-day.selected {
  box-shadow: 0 0 0 3px var(--primary-light) !important;
}
.calendar-day.today::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  background: var(--primary);
  border-radius: 50%;
}
.mood-btn.selected {
  transform: scale(1.15) !important;
  box-shadow: 0 4px 15px rgba(128, 203, 196, 0.4);
}
.tag-btn.active {
  border-color: transparent !important;
  box-shadow: 0 2px 8px rgba(255, 154, 174, 0.3);
}

/* === TASKS SPECIFIC === */
.item.done .item-title {
  text-decoration: line-through;
  color: var(--text-light);
}
.item.done .item-checkbox {
  background: var(--primary) !important;
  border-color: var(--primary) !important;
  color: white;
}

/* === NOTES SPECIFIC === */
.notes-grid .item:hover {
  background: linear-gradient(90deg, var(--surface-secondary), rgba(128, 203, 196, 0.15));
}

/* === RESPONSIVE FIXES === */
@media (max-width: 480px) {
  .section-title {
    font-size: 16px !important;
  }
  .btn-primary {
    padding: 12px 16px !important;
    font-size: 14px !important;
  }
}
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <header class="header" id="app-header" style="display:none">
        <span class="logo">🌸 Нежный дневник</span>
        <div class="user-actions">
            <label class="theme-toggle">
                <input type="checkbox" id="themeSwitch">
                <span class="slider"></span>
            </label>
            <div class="avatar-btn" id="userAvatar">🌸</div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="nav" id="app-nav" style="display:none">
        <button data-route="tasks" class="nav-btn active">📝 Планы</button>
        <button data-route="notes" class="nav-btn">📔 Заметки</button>
        <button data-route="tracker" class="nav-btn">📊 Прогресс</button>
    </nav>

    <!-- Main Content -->
    <main id="main-container">
        <!-- Auth Screen -->
        <div id="auth-root">
            <div class="auth-card">
                <div class="empty-icon" style="font-size:48px;margin-bottom:12px">🌸</div>
                <h2 class="auth-title">Добро пожаловать</h2>
                <p class="auth-subtitle">Войди или создай аккаунт</p>
                
                <div class="auth-tabs">
                    <button class="tab-btn active" id="tab-login">Вход</button>
                    <button class="tab-btn" id="tab-register">Регистрация</button>
                </div>
                
                <form id="auth-form">
                    <input type="email" id="auth-email" class="auth-input" placeholder="Email" required>
                    <input type="password" id="auth-password" class="auth-input" placeholder="Пароль" minlength="6" required>
                    <input type="text" id="auth-username" class="auth-input" placeholder="Имя" style="display:none">
                    <button type="submit" id="auth-submit" class="btn-primary">Войти</button>
                </form>
                
                <div id="auth-message" class="auth-message" style="display:none"></div>
            </div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="btn-floating" id="fab" style="display:none" title="Добавить">+</button>
</div>

<!-- Confirm Modal -->
<div id="confirmModal" class="confirm-modal">
    <div class="confirm-content">
        <div class="confirm-icon">🗑️</div>
        <div class="confirm-text" id="confirmMessage">Удалить?</div>
        <div class="confirm-subtext" id="confirmSubtext">Это действие нельзя отменить</div>
        <div class="confirm-buttons">
            <button class="btn-secondary" id="confirmCancelBtn">Отмена</button>
            <button class="btn-danger" id="confirmOkBtn">Удалить</button>
        </div>
    </div>
</div>

<!-- Generic Modal for modules -->
<div id="moduleModal" class="modal">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">Новый элемент</div>
        <div id="modalBody"></div>
        <div class="modal-buttons">
            <button class="btn-secondary" id="modalCancelBtn">Отмена</button>
            <button class="btn-primary" id="modalSaveBtn">Сохранить</button>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">👤 Мой профиль</div>
        <div style="text-align:center;margin-bottom:16px">
            <div style="font-size:56px;margin-bottom:8px;cursor:pointer" id="profileAvatar">🌸</div>
            <input type="text" id="profileName" placeholder="Твоё имя" class="modal-input" style="text-align:center">
        </div>
        <textarea id="profileBio" rows="2" placeholder="О себе..." class="modal-textarea"></textarea>
        <div style="margin:16px 0">
            <div style="font-weight:500;margin-bottom:8px;font-size:14px">🎨 Тема</div>
            <div class="theme-options">
                <button class="theme-btn" data-theme="light">🌞 Светлая</button>
                <button class="theme-btn" data-theme="dark">🌙 Тёмная</button>
            </div>
        </div>
        <button class="btn-primary" id="saveProfileBtn">Сохранить</button>
        <button class="btn-secondary" id="closeProfileBtn" style="margin-top:8px">Отмена</button>
        <button class="btn-secondary" id="logoutProfileBtn" style="margin-top:8px;border-color:#FFCDD2;color:#E57373">Выйти</button>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"><span id="toastIcon">✨</span><span id="toastText"></span></div>
<script>
  // Глобальные утилиты — определяем ДО загрузки модулей
  window.showToast = function(text, icon = '✨') {
    const toast = document.getElementById('toast');
    if (!toast) return;
    document.getElementById('toastIcon').textContent = icon;
    document.getElementById('toastText').textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  };

  window.confirmDialog = function(message, subtext = 'Это действие нельзя отменить') {
    return new Promise(resolve => {
      const modal = document.getElementById('confirmModal');
      if (!modal) return resolve(false);
      document.getElementById('confirmMessage').textContent = message;
      document.getElementById('confirmSubtext').textContent = subtext;
      modal.classList.add('active');
      
      const cleanup = (result) => {
        modal.classList.remove('active');
        document.getElementById('confirmOkBtn').onclick = null;
        document.getElementById('confirmCancelBtn').onclick = null;
        resolve(result);
      };
      document.getElementById('confirmOkBtn').onclick = () => cleanup(true);
      document.getElementById('confirmCancelBtn').onclick = () => cleanup(false);
    });
  };

  window.showModuleModal = function(title, contentHtml, onSave) {
    return new Promise(resolve => {
      const modal = document.getElementById('moduleModal');
      if (!modal) return resolve(false);
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = contentHtml;
      modal.classList.add('active');
      
      const cleanup = (result) => {
        modal.classList.remove('active');
        document.getElementById('modalSaveBtn').onclick = null;
        document.getElementById('modalCancelBtn').onclick = null;
        resolve(result);
      };
      document.getElementById('modalSaveBtn').onclick = () => cleanup(true);
      document.getElementById('modalCancelBtn').onclick = () => cleanup(false);
    });
  };

  window.Core = window.Core || {
    modules: {},
    registerModule: function(name, instance) {
      this.modules[name] = instance;
    },
    getModule: function(name) {
      return this.modules[name];
    }
  };
</script>

<script>
/**
 * 🌸 Core System — загрузчик модулей для "Нежного дневника"
 */
(function() {
  // Создаём Core если нет
  window.Core = window.Core || {
    modules: {},
    container: null,
    currentModule: null,
    
    // Регистрация модуля
    registerModule: function(name, instance) {
      this.modules[name] = instance;
      console.log(`📦 Модуль "${name}" зарегистрирован`);
    },
    
    // Инициализация системы
    init: async function() {
      this.container = document.getElementById('main-container');
      if (!this.container) {
        console.error('❌ Контейнер #main-container не найден');
        return;
      }
      console.log('✨ Core initialized');
    },
    
    // Загрузка модуля
    loadModule: async function(name) {
      const module = this.modules[name];
      
      if (!module) {
        console.warn(`⚠️ Модуль "${name}" не найден`);
        // Показываем заглушку
        if (this.container) {
          this.container.innerHTML = `
            <div class="card">
              <div class="empty-state" style="padding:40px 20px">
                <div class="empty-icon" style="font-size:48px;margin-bottom:12px">🔧</div>
                <p class="empty-text">Модуль "${name}" пока не подключен</p>
              </div>
            </div>
          `;
        }
        return;
      }
      
      // Скрываем старые элементы модулей если есть
      document.querySelectorAll('.module-content')?.forEach(el => {
        el.style.display = 'none';
      });
      
      // Создаём или находим контейнер для модуля
      let moduleContainer = document.getElementById(`module-${name}`);
      if (!moduleContainer) {
        moduleContainer = document.createElement('div');
        moduleContainer.id = `module-${name}`;
        moduleContainer.className = 'module-content';
        this.container.appendChild(moduleContainer);
      }
      
      // Показываем нужный контейнер, скрываем остальные
      document.querySelectorAll('.module-content')?.forEach(el => {
        el.style.display = el.id === `module-${name}` ? 'block' : 'none';
      });
      
      // Рендерим модуль
      try {
        if (typeof module.render === 'function') {
          module.render(moduleContainer);
        }
        if (typeof module.init === 'function') {
          await module.init();
        }
        this.currentModule = name;
        console.log(`✅ Модуль "${name}" загружен`);
      } catch (err) {
        console.error(`❌ Ошибка загрузки модуля "${name}":`, err);
        moduleContainer.innerHTML = `
          <div class="card">
            <div class="empty-state" style="padding:40px 20px">
              <div class="empty-icon" style="font-size:48px;margin-bottom:12px">⚠️</div>
              <p class="empty-text">Ошибка загрузки модуля</p>
              <p style="font-size:12px;color:var(--text-light);margin-top:8px">${err.message}</p>
            </div>
          </div>
        `;
      }
    },
    
    // Получить активный модуль
    getActiveModule: function() {
      return this.modules[this.currentModule] || null;
    },
    
    // Обновить текущий модуль (перерендер)
    refresh: async function() {
      if (this.currentModule) {
        await this.loadModule(this.currentModule);
      }
    }
  };
  
  console.log('🌸 Core System loaded');
})();
</script>

<script>
/**
 * 🌸 Main App Initialization
 */
async function initApp() {
  console.log('🚀 Нежный дневник запускается...');
  
  // Ждём загрузки всех скриптов
  await new Promise(resolve => {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', resolve);
    } else {
      resolve();
    }
  });
  
  // Проверяем авторизацию
  const savedUser = sessionStorage.getItem('authUser');
  
  if (savedUser) {
    // Пользователь авторизован — показываем приложение
    window.currentUser = JSON.parse(savedUser);
    showAppInterface();
    await startApp();
  } else {
    // Показываем экран авторизации
    showAuthInterface();
  }
  
  // Глобальная функция для перехода в приложение после логина
  window.appReady = async function() {
    await startApp();
  };
}

async function startApp() {
  // Инициализируем Core
  await window.Core?.init?.();
  
  // Инициализируем роутер
  if (window.Router?.init) {
    window.Router.init();
  }
  
  // Загружаем модуль по умолчанию
  const defaultRoute = 'tasks';
  if (window.Router?.navigate) {
    await window.Router.navigate(defaultRoute);
  } else if (window.Core?.loadModule) {
    await window.Core.loadModule(defaultRoute);
  }
  
  console.log('✨ Приложение готово 🌸');
}

function showAppInterface() {
  document.getElementById('auth-root').style.display = 'none';
  document.getElementById('app-header').style.display = 'flex';
  document.getElementById('app-nav').style.display = 'flex';
  document.getElementById('fab').style.display = 'flex';
  
  // Обновляем аватар
  const user = window.currentUser;
  if (user?.username) {
    const avatar = user.username[0]?.toUpperCase() || '🌸';
    document.getElementById('userAvatar').textContent = avatar;
    document.getElementById('profileAvatar').textContent = avatar;
    document.getElementById('profileName').value = user.username;
  }
}

function showAuthInterface() {
  document.getElementById('auth-root').style.display = 'flex';
  document.getElementById('app-header').style.display = 'none';
  document.getElementById('app-nav').style.display = 'none';
  document.getElementById('fab').style.display = 'none';
}

// Запускаем
initApp();
</script>

<script>
// === THEME MANAGEMENT ===
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;
const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
html.setAttribute('data-theme', savedTheme);
if(themeSwitch) themeSwitch.checked = savedTheme === 'dark';
if(themeSwitch) {
    themeSwitch.onchange = () => {
        const theme = themeSwitch.checked ? 'dark' : 'light';
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        // Update meta theme-color
        document.getElementById('themeColor').content = theme === 'dark' ? '#1a1a2e' : '#FFB6C1';
    };
}

// === AUTH LOGIC (сохранена полностью) ===
const savedUser = sessionStorage.getItem('authUser');
if (savedUser) {
    window.currentUser = JSON.parse(savedUser);
    showApp();
}

const form = document.getElementById('auth-form');
const tabs = document.querySelectorAll('.tab-btn');
const message = document.getElementById('auth-message');
const submitBtn = document.getElementById('auth-submit');
const usernameInput = document.getElementById('auth-username');
let mode = 'login';

tabs[0].onclick = () => { 
    mode = 'login'; 
    tabs[0].classList.add('active'); 
    tabs[1].classList.remove('active'); 
    submitBtn.textContent = 'Войти';
    usernameInput.style.display = 'none';
    usernameInput.required = false;
};
tabs[1].onclick = () => { 
    mode = 'register'; 
    tabs[1].classList.add('active'); 
    tabs[0].classList.remove('active'); 
    submitBtn.textContent = 'Зарегистрироваться';
    usernameInput.style.display = 'block';
    usernameInput.required = true;
};

form.onsubmit = async (e) => {
    e.preventDefault();
    showMessage('⏳ Загрузка...', 'info');
    submitBtn.disabled = true;

    try {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const username = document.getElementById('auth-username').value;
        
        const url = mode === 'register' ? 'register' : 'login';
        
        const res = await fetch(`https://trekerzzss-1.onrender.com/${url}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
        });

        if (!res.ok) {
            const text = await res.text();
            throw new Error(`HTTP ${res.status}: ${text} ||| ${url}`);
        }

        const data = await res.json();
        
        showMessage(mode === 'register' ? '✅ Регистрация!': '✅ Вход выполнен!', 'success');
        
        setTimeout(async () => {
            window.currentUser = { email, username: username || email.split('@')[0] };
            sessionStorage.setItem('authUser', JSON.stringify(window.currentUser));
            sessionStorage.setItem('authSession', JSON.stringify(data.session || {}));
            
            showApp();
            await window.Core?.init?.();
            window.Router?.init?.();
            await window.Core?.loadModule?.('tasks');
        }, 1200);
        
    } catch (err) {
        showMessage(err.message.includes('not confirmed') ? '📧 Подтверди email' : `❌ ${err.message}`, 'error');
    } finally {
        submitBtn.disabled = false;
    }
};

function showMessage(text, type) {
    message.textContent = text;
    message.className = `auth-message ${type}`;
    message.style.display = 'block';
    if(type === 'success') setTimeout(() => message.style.display = 'none', 2000);
}

function showApp() {
    document.getElementById('auth-root').style.display = 'none';
    document.getElementById('app-header').style.display = 'flex';
    document.getElementById('app-nav').style.display = 'flex';
    document.getElementById('fab').style.display = 'flex';
    
    // Update avatar
    const avatar = window.currentUser?.username?.[0]?.toUpperCase() || '🌸';
    document.getElementById('userAvatar').textContent = avatar;
    document.getElementById('profileAvatar').textContent = avatar;
    document.getElementById('profileName').value = window.currentUser?.username || '';
}

window.logout = function() {
    sessionStorage.removeItem('authUser');
    sessionStorage.removeItem('authSession');
    window.currentUser = null;
    location.reload();
};

// === PROFILE MODAL ===
document.getElementById('userAvatar').onclick = () => {
    document.getElementById('profileModal').classList.add('active');
};
document.getElementById('closeProfileBtn').onclick = () => {
    document.getElementById('profileModal').classList.remove('active');
};
document.getElementById('logoutProfileBtn').onclick = () => {
    document.getElementById('profileModal').classList.remove('active');
    window.logout();
};
document.getElementById('saveProfileBtn').onclick = () => {
    const name = document.getElementById('profileName').value;
    if(name && window.currentUser) {
        window.currentUser.username = name;
        sessionStorage.setItem('authUser', JSON.stringify(window.currentUser));
        document.getElementById('userAvatar').textContent = name[0]?.toUpperCase() || '🌸';
        showToast('Профиль сохранён ✨');
    }
    document.getElementById('profileModal').classList.remove('active');
};

// Theme buttons in profile
document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const theme = btn.dataset.theme;
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        if(themeSwitch) themeSwitch.checked = theme === 'dark';
        document.getElementById('themeColor').content = theme === 'dark' ? '#1a1a2e' : '#FFB6C1';
    };
});

// === TOAST ===
function showToast(text, icon = '✨') {
    const toast = document.getElementById('toast');
    document.getElementById('toastIcon').textContent = icon;
    document.getElementById('toastText').textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// === CONFIRM MODAL ===
window.confirmDialog = function(message, subtext = 'Это действие нельзя отменить') {
    return new Promise(resolve => {
        document.getElementById('confirmMessage').textContent = message;
        document.getElementById('confirmSubtext').textContent = subtext;
        document.getElementById('confirmModal').classList.add('active');
        
        const onOk = () => cleanup(true);
        const onCancel = () => cleanup(false);
        
        function cleanup(result) {
            document.getElementById('confirmModal').classList.remove('active');
            document.getElementById('confirmOkBtn').onclick = null;
            document.getElementById('confirmCancelBtn').onclick = null;
            resolve(result);
        }
        
        document.getElementById('confirmOkBtn').onclick = onOk;
        document.getElementById('confirmCancelBtn').onclick = onCancel;
    });
};

// === GENERIC MODAL FOR MODULES ===
window.showModuleModal = function(title, contentHtml, onSave) {
    return new Promise(resolve => {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = contentHtml;
        document.getElementById('moduleModal').classList.add('active');
        
        const onSaveClick = () => {
            document.getElementById('moduleModal').classList.remove('active');
            document.getElementById('modalSaveBtn').onclick = null;
            document.getElementById('modalCancelBtn').onclick = null;
            resolve(true);
            if(onSave) onSave();
        };
        const onCancel = () => {
            document.getElementById('moduleModal').classList.remove('active');
            document.getElementById('modalSaveBtn').onclick = null;
            document.getElementById('modalCancelBtn').onclick = null;
            resolve(false);
        };
        
        document.getElementById('modalSaveBtn').onclick = onSaveClick;
        document.getElementById('modalCancelBtn').onclick = onCancel;
    });
};

// === FAB BUTTON ===
document.getElementById('fab').onclick = async () => {
    const route = document.querySelector('.nav-btn.active')?.dataset?.route || 'tasks';
    if(window.Router?.currentRoute) {
        // Delegate to active module
        if(window.Tasks?.showAddModal) await window.Tasks.showAddModal();
        else if(window.Notes?.showAddModal) await window.Notes.showAddModal();
        else if(window.Tracker?.showAddModal) await window.Tracker.showAddModal();
    }
};

// === SERVICE WORKER ===
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('✅ SW registered'))
        .catch(err => console.log('❌ SW failed:', err));
}

// === INIT ===
console.log('🌸 Нежный дневник PWA загружен');
</script>
