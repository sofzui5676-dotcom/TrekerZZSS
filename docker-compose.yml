services:
  backend:
    image: node:20
    container_name: smart-dashboard-backend
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "cd /app && npm install && node server/server.js"
    ports:
      - "4000:4000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 10s
      retries: 5

  frontend:
    image: nginx:alpine
    container_name: smart-dashboard-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./public/:/usr/share/nginx/html/public/
      - ./src/:/usr/share/nginx/html/src/
    depends_on:
      backend:
        condition: service_healthy