
    server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Прокси /api → бэкенд на Render
   location /api/ {
    rewrite ^/api/(.*) /$1 break;  # Убираем /api/ из пути
    proxy_pass https://trekerzzss-1.onrender.com;
    proxy_http_version 1.1;
    proxy_set_header Host trekerzzss-1.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Таймауты + буферы для Render
    proxy_connect_timeout 75s;
    proxy_send_timeout 75s;
    proxy_read_timeout 75s;
    proxy_buffers 8 16k;
    proxy_buffer_size 32k;
    
    # Нет редиректов
    proxy_redirect off;
}

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # manifest.json
    location = /manifest.json {
        add_header Content-Type application/manifest+json;
    }

    # service worker (если он в src/)
    location ~ /src/serviceWorker\.js$ {
        add_header Cache-Control "no-cache";
    }

    # offline fallback
    error_page 404 /offline.html;
}
